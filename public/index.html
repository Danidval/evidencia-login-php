<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Cursos</title>
    <!-- Fuente Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="content">
        <!-- Pantalla de login/registro (se oculta tras login) -->
        <div id="authPanel" style="display: block;">
            <header class="bg-dark text-white py-3">
                <div class="container">
                    <h1 class="h3"><i class="fas fa-code"></i> Servicio Web - Registro y Login</h1>
                </div>
            </header>
            <nav class="navbar navbar-expand-lg navbar-light bg-light">
                <div class="container">
                    <a class="navbar-brand" href="#">API REST</a>
                </div>
            </nav>
            <main class="py-5">
                <div class="container">
                    <div class="row justify-content-center">
                        <div class="col-lg-6 col-md-8 col-sm-10">
                            <div class="card shadow">
                                <div class="card-header bg-primary text-white">
                                    <ul class="nav nav-tabs card-header-tabs" id="authTabs" role="tablist">
                                        <li class="nav-item">
                                            <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#loginPanel" type="button">Iniciar sesión</button>
                                        </li>
                                        <li class="nav-item">
                                            <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#registerPanel" type="button">Registrarse</button>
                                        </li>
                                    </ul>
                                </div>
                                <div class="card-body">
                                    <div class="tab-content">
                                        <!-- Login -->
                                        <div class="tab-pane fade show active" id="loginPanel">
                                            <form id="loginFormElement">
                                                <div class="mb-3">
                                                    <label for="loginUsername" class="form-label">Usuario</label>
                                                    <input type="text" class="form-control" id="loginUsername" autocomplete="off" required>
                                                </div>
                                                <div class="mb-3">
                                                    <label for="loginPassword" class="form-label">Clave</label>
                                                    <input type="password" class="form-control" id="loginPassword" required>
                                                </div>
                                                <button type="submit" class="btn btn-primary w-100"><i class="fas fa-sign-in-alt"></i> Ingresar</button>
                                                <div id="loginMessage" class="message mt-3"></div>
                                            </form>
                                        </div>
                                        <!-- Registro -->
                                        <div class="tab-pane fade" id="registerPanel">
                                            <form id="registerFormElement">
                                                <div class="mb-3">
                                                    <label for="registerFullname" class="form-label">Nombre completo</label>
                                                    <input type="text" class="form-control" id="registerFullname" autocomplete="off" required>
                                                </div>
                                                <div class="mb-3">
                                                    <label for="registerUsername" class="form-label">Usuario</label>
                                                    <input type="text" class="form-control" id="registerUsername" autocomplete="off" required>
                                                </div>
                                                <div class="mb-3">
                                                    <label for="registerPassword" class="form-label">Clave</label>
                                                    <input type="password" class="form-control" id="registerPassword" required>
                                                </div>
                                                <div class="mb-3">
                                                    <label for="registerPassword2" class="form-label">Repetir Clave</label>
                                                    <input type="password" class="form-control" id="registerPassword2" required>
                                                </div>
                                                <button type="submit" class="btn btn-success w-100"><i class="fas fa-user-plus"></i> Registrarse</button>
                                                <div id="registerMessage" class="message mt-3"></div>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
            <footer class="bg-light text-center py-3 mt-4">
                <p class="mb-0">&copy; 2026 - Servicio Web para registro y login</p>
            </footer>
        </div>

        <!-- DASHBOARD: Tabla de cursos + CRUD (se muestra tras login) -->
        <div id="dashboardPanel" style="display: none;">
            <div class="container mt-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="fas fa-chalkboard-teacher"></i> Gestión de Cursos</h2>
                    <button id="logoutBtn" class="btn btn-danger"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</button>
                </div>
                <div class="mb-3">
                    <button id="btnCrearCurso" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#cursoModal">
                        <i class="fas fa-plus"></i> Nuevo Curso
                    </button>
                </div>
                <div class="table-responsive">
                    <table class="table table-bordered table-hover" id="cursosTable">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Título</th>
                                <th>Descripción</th>
                                <th>Instructor</th>
                                <th>Precio</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="cursosTableBody">
                            <tr><td colspan="6" class="text-center">Cargando cursos...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL PARA CREAR/EDITAR CURSO -->
    <div class="modal fade" id="cursoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalTitle">Nuevo Curso</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="cursoId">
                    <div class="mb-3">
                        <label for="titulo" class="form-label">Título *</label>
                        <input type="text" class="form-control" id="titulo" required>
                    </div>
                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea class="form-control" id="descripcion" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="instructor" class="form-label">Instructor *</label>
                        <input type="text" class="form-control" id="instructor" required>
                    </div>
                    <div class="mb-3">
                        <label for="imagen" class="form-label">URL Imagen</label>
                        <input type="text" class="form-control" id="imagen">
                    </div>
                    <div class="mb-3">
                        <label for="precio" class="form-label">Precio *</label>
                        <input type="number" step="0.01" class="form-control" id="precio" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="saveCursoBtn">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Nuestro JS -->
    <script src="js/main.js"></script>
</body>
</html>
